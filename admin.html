<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE ADMIN | v39.5 CMC-MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@12.1.0/dist/stellar-sdk.min.js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --panel: #0a0a0a; --buy: #39ff14; --sell: #ff4444; --hold: #ffd700; }
        body { background-color: var(--bg); color: #eee; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #pin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--neon); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #main-content { display: none; width: 100%; max-width: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .bank-box { background: var(--panel); border: 1px solid var(--neon); padding: 10px; border-radius: 8px; text-align: center; }
        .bank-val { font-size: 1.2rem; font-weight: bold; color: var(--neon); }
        .grid-table { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .row { background: var(--panel); border: 1px solid #333; padding: 10px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; align-items: center; text-align: center; }
        .row.head { font-weight: bold; border-color: var(--neon); color: var(--neon); font-size: 0.7rem; }
        .input-box { background: #000; border: 1px solid #444; color: #fff; padding: 5px; width: 50px; text-align: center; border-radius: 4px; }
        .btn-save { background: var(--buy); color: #000; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-asset { background: #222; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        #asset-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 10000; }
        .asset-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .asset-item { background: #111; border: 1px solid #444; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; }
        .history-list { margin-top: 20px; }
        .history-row { background: #111; border-bottom: 1px solid #222; padding: 8px; font-size: 0.7rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="pin-screen">
        <h2>ADMIN ACCESS</h2>
        <input type="password" id="pin-input" maxlength="4" style="background:#000; border:1px solid var(--neon); color:var(--neon); padding:10px; text-align:center; font-size:1.5rem; width:100px;">
        <button onclick="checkPin()" style="margin-top:20px; background:var(--neon); color:#000; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">ENTER</button>
    </div>

    <div id="main-content">
        <div class="header">
            <div><h1>ORACLE ADMIN</h1><a href="index.html" style="color:var(--neon); text-decoration:none; font-size:0.7rem;">← BACK TO TERMINAL</a></div>
            <div class="bank-box"><div class="bank-val" id="total-bank">0.00 USDT</div><div style="font-size:0.6rem;">LIVE CLOUD BANK</div></div>
        </div>

        <button class="btn-asset" onclick="openAssetModal()">ACTIVATE ASSETS</button>

        <div class="grid-table">
            <div class="row head"><span>SYMBOL</span><span>PRICE</span><span>HYPE %</span><span>ACTION</span></div>
            <div id="table-body"></div>
        </div>

        <div class="history-list">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>TRADE HISTORY (CLOUD)</h3>
                <button onclick="wipeAll()" style="color:var(--sell); background:none; border:1px solid var(--sell); padding:2px 10px; border-radius:4px; font-size:0.6rem; cursor:pointer;">WIPE ALL</button>
            </div>
            <div id="cloud-history"></div>
        </div>
    </div>

    <div id="asset-modal">
        <h3>SELECT ACTIVE ASSETS</h3>
        <div class="asset-list" id="asset-checklist"></div>
        <button onclick="confirmAssetSelection()" style="margin-top:20px; background:var(--buy); border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">CONFIRM & SYNC</button>
    </div>

    <script>
        const SB_URL = "https://zrbqhhnxshrayctqmncy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyYnFoaG54c2hyYXljdHFtbmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODE2MjcsImV4cCI6MjA4NzI1NzYyN30.7JA6rGog3TphPqdb3tbHz4D03haXSFWZOXwi2yK_uek";
        const supaClient = supabase.createClient(SB_URL, SB_KEY);

        let activeAssets = ['BTC', 'ETH', 'SOL', 'BNB', 'XRP', 'ADA', 'DOGE', 'LTC', 'PI', 'M'];
        const allPossibleAssets = ['BTC', 'ETH', 'SOL', 'BNB', 'XRP', 'ADA', 'DOGE', 'LTC', 'PI', 'M'];
        let cachePrices = {}, cacheHype = [], cacheSignals = [];

        function checkPin() { if(document.getElementById('pin-input').value === '8550') { document.getElementById('pin-screen').style.display='none'; document.getElementById('main-content').style.display='block'; initAdmin(); } else { alert("WRONG PIN"); } }

        async function initAdmin() {
            const { data } = await supaClient.from('oracle_settings').select('*').eq('id', 'active_assets').single();
            if(data) activeAssets = data.value;
            await updateDashboard();
            setInterval(updateDashboard, 15000);
            refreshCloud();
        }

        async function updateDashboard() {
            try {
                const [rH, rS, rB] = await Promise.all([
                    supaClient.from('oracle_hype').select('*'),
                    supaClient.from('oracle_signals').select('*'),
                    fetch("/api/oracle-bridge").then(r=>r.json()).catch(()=>[])
                ]);
                cacheHype = rH.data || []; cacheSignals = rS.data || [];
                if(Array.isArray(rB)) rB.forEach(a => cachePrices[a.id] = a.price);
                renderTable();
            } catch(e) {}
        }

        function renderTable() {
            let html = "";
            activeAssets.forEach(sym => {
                const price = cachePrices[sym] || 0;
                const hype = cacheHype.find(h => h.symbol === sym)?.score || 0;
                html += `<div class="row">
                    <span style="font-weight:bold;">${sym}</span>
                    <span>$${price.toLocaleString()}</span>
                    <input type="number" id="hype-${sym}" value="${hype}" class="input-box">
                    <button class="btn-save" onclick="saveHype('${sym}')">SET</button>
                </div>`;
            });
            document.getElementById('table-body').innerHTML = html;
        }

        async function saveHype(sym) {
            const val = parseInt(document.getElementById(`hype-${sym}`).value);
            await supaClient.from('oracle_hype').upsert({ symbol: sym, score: val, last_update: new Date().toISOString() });
            alert(`${sym} HYPE SET TO ${val}%`);
        }

        function openAssetModal() { document.getElementById('asset-modal').style.display = 'block'; renderChecklist(); }
        function renderChecklist() {
            document.getElementById('asset-checklist').innerHTML = allPossibleAssets.map(a => `
                <div class="asset-item" onclick="toggleTempAsset('${a}')" style="border-color:${activeAssets.includes(a)?'var(--buy)':'#444'}">
                    <span style="color:${activeAssets.includes(a)?'var(--buy)':'#fff'}">${a}</span>
                </div>`).join('');
        }
        function toggleTempAsset(a) { if(activeAssets.includes(a)) activeAssets = activeAssets.filter(i=>i!==a); else activeAssets.push(a); renderChecklist(); }
        async function confirmAssetSelection() {
            await supaClient.from('oracle_settings').upsert({ id: 'active_assets', value: activeAssets });
            document.getElementById('asset-modal').style.display = 'none';
            updateDashboard();
        }

        async function refreshCloud() {
            const { data } = await supaClient.from('oracle_trade_history').select('*').order('created_at', {ascending:false}).limit(50);
            if(data) {
                document.getElementById('cloud-history').innerHTML = data.map(t => `
                    <div class="history-row">
                        <span>${new Date(t.created_at).toLocaleTimeString()} <b>${t.symbol}</b></span>
                        <span style="color:${t.pnl>=0?'var(--buy)':'var(--sell)'}">${t.pnl.toFixed(2)} USDT</span>
                    </div>`).join('');
                const { data:acc } = await supaClient.from('oracle_account').select('balance').eq('id', 1).single();
                if(acc) document.getElementById('total-bank').innerText = acc.balance.toFixed(2) + " USDT";
            }
        }
        async function wipeAll() { if(confirm("CLEAR CLOUD HISTORY?")) { await supaClient.from('oracle_trade_history').delete().neq('symbol', 'VOID'); refreshCloud(); } }
    </script>
</body>
</html>
