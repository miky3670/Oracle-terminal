<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE ADMIN | v146.0 SMART-AUTH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@12.1.0/dist/stellar-sdk.min.js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --panel: #0a0a0a; --buy: #39ff14; --sell: #ff4444; --hold: #ffd700; }
        body { background-color: var(--bg); color: #eee; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #pin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--neon); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50000; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 20px; font-size: 1.5rem; border-radius: 50%; cursor: pointer; width: 75px; height: 75px; font-family: inherit; }
        .pin-btn:active { background: var(--neon); color: #000; }
        #pin-display { font-size: 3rem; letter-spacing: 10px; margin-bottom: 20px; color: #fff; }
        
        .header-box { width: 100%; max-width: 900px; padding: 10px 0; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #222; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 1.1rem; letter-spacing: 2px; margin: 0; text-transform: uppercase; font-weight: 900; }
        .sub-title { font-size: 0.65rem; color: var(--neon); letter-spacing: 1px; margin-top: 5px; }
        
        .header-link { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .header-link:hover { background: var(--neon); color: #000; }

        .nav-grid { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        .nav-btn { background: #111; border: 2px solid #333; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; position: relative; font-family: inherit; min-width: 80px; }
        .nav-btn.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; position: absolute; top: 5px; right: 5px; background-color: var(--buy); }
        
        .main-panel { width: 100%; max-width: 900px; background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 15px; box-sizing: border-box; min-height: 400px; overflow: hidden; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px double #333; padding-bottom: 15px; margin-bottom: 10px; }
        .current-asset { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: 3px; }
        .hype-indicator { font-size: 0.9rem; font-weight: bold; color: var(--neon); border: 1px solid var(--neon); padding: 5px 8px; border-radius: 20px; }
        
        /* NOVÁ TLAČÍTKA V HLAVIČCE */
        .ai-header-btns { display: flex; gap: 8px; margin-left: auto; margin-right: 15px; }
        .btn-ai-chat { background: #111; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ai-chat.active-msg { border-color: var(--buy); color: var(--buy); box-shadow: 0 0 10px var(--buy); animation: pulse 1.5s infinite; }
        .btn-ai-conf { background: #111; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; margin-top: 10px; table-layout: fixed; }
        th { text-align: left; color: #555; font-size: 0.7rem; border-bottom: 1px solid #333; padding: 8px; }
        td { padding: 5px; font-size: 0.85rem; color: #ccc; vertical-align: middle; border-bottom: 1px solid #151515; }
        
        /* TICKER - NEDOTÝKAT SE LOGIKY */
        .ticker-window { background: #000; border: 1px solid #222; border-radius: 4px; height: 30px; width: 100%; overflow: hidden; position: relative; display: flex; align-items: center; mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .ticker-track { display: flex; white-space: pre; width: fit-content; animation: ticker-loop 300s linear infinite; pointer-events: auto; }
        .ticker-window:hover .ticker-track { animation-play-state: paused; }
        .ticker-item { padding-right: 0; color: #aaa; font-family: 'Courier New', monospace; font-size: 0.8rem; }
        @keyframes ticker-loop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .footer-box { width: 100%; max-width: 900px; margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .footer-btn { background: #111; border: 1px solid #444; color: #888; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
        
        /* MODÁLY FULLSCREEN */
        #asset-modal, #learning-modal, #chat-modal, #config-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 40000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 700px; margin: 0 auto; background: #0a0a0a; border: 2px solid var(--neon); border-radius: 12px; padding: 25px; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #555; cursor: pointer; }
        .close-x:hover { color: #fff; }

        /* CHAT UI */
        #chat-history { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #222; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 0.85rem; position: relative; }
        .msg-user { align-self: flex-end; background: #111; border: 1px solid var(--neon); }
        .msg-ai { align-self: flex-start; background: #222; border: 1px solid #444; }
        .msg-status { font-size: 0.6rem; margin-left: 5px; }

        .c-buy { color: var(--buy); font-weight: bold; }
        .c-sell { color: var(--sell); font-weight: bold; }
        .c-hold { color: var(--hold); opacity: 0.7; }
    </style>
</head>
<body>
    <div id="pin-screen">
        <h2 style="letter-spacing: 5px; color: #fff;">ADMIN ACCESS</h2>
        <div id="pin-display">____</div>
        <div class="pin-grid">
            <button class="pin-btn" onclick="press('1')">1</button><button class="pin-btn" onclick="press('2')">2</button><button class="pin-btn" onclick="press('3')">3</button>
            <button class="pin-btn" onclick="press('4')">4</button><button class="pin-btn" onclick="press('5')">5</button><button class="pin-btn" onclick="press('6')">6</button>
            <button class="pin-btn" onclick="press('7')">7</button><button class="pin-btn" onclick="press('8')">8</button><button class="pin-btn" onclick="press('9')">9</button>
            <button class="pin-btn" onclick="clearPin()" style="color:var(--sell)">C</button><button class="pin-btn" onclick="press('0')">0</button><button class="pin-btn" onclick="validatePin()" style="color:var(--buy)">OK</button>
        </div>
    </div>

    <div id="admin-content" style="display: none; width: 100%; max-width: 900px;">
        <div class="header-box">
            <div><h1>ORACLE SIGNALS</h1><div class="sub-title">VERTEX AI INTEGRATION</div></div>
            <a href="index.html" class="header-link" target="_self">[ ⬌ TERMINÁL ]</a>
        </div>
        <div class="nav-grid" id="asset-nav"></div>
        <div class="main-panel">
            <div class="panel-header">
                <div class="current-asset" id="display-asset">BTC</div>
                <div class="ai-header-btns">
                    <button id="chatBtn" class="btn-ai-chat" onclick="openChat()">[ CHAT ]</button>
                    <button class="btn-ai-conf" onclick="openConfig()">[ CONF ]</button>
                </div>
                <div class="hype-indicator" id="display-hype">0%</div>
            </div>
            <table>
                <thead>
                    <tr><th style="width:50px">TF</th><th style="width:100px">VERDIKT</th><th style="padding-left:10px">VERTEX AI ANALÝZA</th><th style="text-align:right; width:120px">CENA</th></tr>
                </thead>
                <tbody id="signal-rows"></tbody>
            </table>
        </div>
        <div class="footer-box">
            <button class="footer-btn" onclick="toggleLang()">[ LANG: <span id="cur-lang">CZ</span> ]</button>
            <button class="footer-btn" onclick="openAssetModal()">[ VÝBĚR MĚN ]</button>
            <button class="footer-btn" onclick="openLearning()">[ REPORT / UČENÍ ]</button>
        </div>
    </div>

    <div id="asset-modal">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('asset-modal').style.display='none'">✕</span>
            <h2 style="color:var(--neon); margin:0 0 10px 0;">VÝBĚR PÁRŮ</h2>
            <div class="asset-grid" id="asset-checklist"></div>
            <button onclick="confirmAssetSelection()" style="width:100%; padding:15px; background:var(--neon); color:#000; border:none; font-weight:900; border-radius:6px; cursor:pointer;">ULOŽIT A ZAVŘÍT</button>
        </div>
    </div>

    <div id="learning-modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeLearning()">✕</span>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--neon); margin:0;">HISTORIE UČENÍ</h2>
                <button onclick="wipeAll()" style="background:none; border:1px solid var(--sell); color:var(--sell); padding:8px 12px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:0.7rem;">[ SMAZAT VŠE ]</button>
            </div>
            <div id="cloud-history-list" style="max-height:400px; overflow-y:auto; border-top:1px solid #333;">Načítám...</div>
            <button onclick="closeLearning()" style="width:100%; padding:15px; margin-top:20px; background:var(--neon); color:#000; border:none; font-weight:900; border-radius:6px; cursor:pointer;">ZAVŘÍT</button>
        </div>
    </div>

    <div id="chat-modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeChat()">✕</span>
            <h2 style="color:var(--neon); margin-bottom:15px;">ORACLE CHAT</h2>
            <div id="chat-history"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chatInput" style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:12px; border-radius:6px; outline:none;" placeholder="Napiš zprávu pro Vertex...">
                <button onclick="sendChatMessage()" style="background:var(--neon); color:#000; border:none; padding:0 20px; border-radius:6px; font-weight:bold; cursor:pointer;">ODESLAT</button>
            </div>
        </div>
    </div>

    <div id="config-modal">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('config-modal').style.display='none'">✕</span>
            <h2 style="color:var(--neon); margin-bottom:15px;">CONFIG AI / FAKTA</h2>
            <div id="config-list" style="max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
            <div style="border-top:1px solid #222; padding-top:15px;">
                <input type="text" id="confKey" placeholder="Klíč (např. pi_status)" style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:10px; margin-bottom:10px; border-radius:4px;">
                <textarea id="confVal" placeholder="Pravdivá fakta pro AI..." style="width:100%; height:80px; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:4px;"></textarea>
                <button onclick="saveConfig()" style="width:100%; padding:12px; background:var(--neon); color:#000; border:none; border-radius:4px; font-weight:bold; margin-top:10px;">ULOŽIT FAKT</button>
            </div>
        </div>
    </div>

    <script>
        let pinInput = ""; 
        const MASTER_PIN = "1970";
        const SB_URL = "https://zrbqhhnxshrayctqmncy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyYnFoaG54c2hyYXljdHFtbmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODE2MjcsImV4cCI6MjA4NzI1NzYyN30.7JA6rGog3TphPqdb3tbHz4D03haXSFWZOXwi2yK_uek";
        let supaClient = null;
        let currentAsset = 'BTC', lang = 'CZ';
        let allPossibleAssets = ['BTC', 'ETH', 'PI', 'M', 'SOL', 'BNB', 'XRP', 'ADA', 'DOGE', 'LTC'];
        let activeAssets = ['BTC', 'ETH', 'PI', 'M'];
        let cacheSignals = [], cacheHype = [], cachePrices = {};
        const verdictDict = { 'BUY': { CZ: 'KOUPIT', EN: 'BUY' }, 'SELL': { CZ: 'PRODAT', EN: 'SELL' }, 'HOLD': { CZ: 'ČEKEJ', EN: 'HOLD' } };

        window.onload = function() {
            if (sessionStorage.getItem('oracle_auth') === 'true') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                startApp();
            }
        };

        function press(n) { if(pinInput.length < 4) { pinInput += n; document.getElementById('pin-display').innerText = "●".repeat(pinInput.length) + "_".repeat(4-pinInput.length); } }
        function clearPin() { pinInput = ""; document.getElementById('pin-display').innerText = "____"; }
        function validatePin() { if(pinInput === MASTER_PIN) { sessionStorage.setItem('oracle_auth', 'true'); document.getElementById('pin-screen').style.display='none'; document.getElementById('admin-content').style.display='block'; startApp(); } else clearPin(); }

        function startApp() { supaClient = supabase.createClient(SB_URL, SB_KEY); init(); }
        async function init() { await loadActiveAssets(); renderNav(); updateDashboard(); setInterval(updateDashboard, 5000); checkChatStatus(); setInterval(checkChatStatus, 10000); }

        async function loadActiveAssets() { try { const { data } = await supaClient.from('oracle_settings').select('value').eq('id', 'active_assets').single(); if(data) activeAssets = data.value; } catch(e) {} }

        // NAVIGATION & DASHBOARD
        function renderNav() { const nav = document.getElementById('asset-nav'); nav.innerHTML = activeAssets.map(a => `<button class="nav-btn ${currentAsset === a ? 'active' : ''}" onclick="switchAsset('${a}')" id="btn-${a}">${a} <div class="status-dot"></div></button>`).join(''); }
        function switchAsset(a) { currentAsset = a; renderNav(); renderTable(); }
        function toggleLang() { lang = lang === 'CZ' ? 'EN' : 'CZ'; document.getElementById('cur-lang').innerText = lang; renderTable(); }

        async function updateDashboard() {
            try {
                const [rH, rS] = await Promise.all([supaClient.from('oracle_hype').select('*'), supaClient.from('oracle_signals').select('*')]);
                cacheHype = rH.data || []; cacheSignals = rS.data || []; renderTable();
            } catch (e) {}
        }

        function renderTable() {
            document.getElementById('display-asset').innerText = currentAsset;
            const h = cacheHype.find(h => h.symbol === currentAsset);
            document.getElementById('display-hype').innerText = (h ? h.score : 0) + "%";
            const tbody = document.getElementById('signal-rows'); tbody.innerHTML = '';
            ['1M', '5M', '15M', '1H', '4H', '1D'].forEach(tf => {
                const sig = cacheSignals.find(s => s.symbol === currentAsset && s.timeframe === tf) || { verdict: 'HOLD', analysis: '...' };
                const tr = document.createElement('tr');
                const rawVerdict = sig.verdict || 'HOLD';
                const vCol = (rawVerdict && rawVerdict.includes('BUY')) ? 'c-buy' : ((rawVerdict && rawVerdict.includes('SELL')) ? 'c-sell' : 'c-hold');
                let analysisText = (lang === 'CZ' ? "ANALÝZA: " : "ANALYSIS: ") + sig.analysis;
                let extendedText = analysisText.trim() + "   +++   ";
                while (extendedText.length < 1000) { extendedText += analysisText.trim() + "   +++   "; }
                tr.innerHTML = `<td>${tf}</td><td class="${vCol}">${verdictDict[rawVerdict] ? verdictDict[rawVerdict][lang] : rawVerdict}</td>
                    <td><div class="ticker-window"><div class="ticker-track"><span class="ticker-item">${extendedText}</span><span class="ticker-item">${extendedText}</span></div></div></td>
                    <td style="text-align:right">$${(sig.price || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>`;
                tbody.appendChild(tr);
            });
        }

        // ORACLE CHAT LOGIKA
        async function checkChatStatus() {
            const { data } = await supaClient.from('oracle_chat').select('status').order('created_at', { ascending: false }).limit(1);
            if (data && data[0].status === 'done') document.getElementById('chatBtn').classList.add('active-msg');
            else document.getElementById('chatBtn').classList.remove('active-msg');
        }

        async function openChat() { 
            document.getElementById('chat-modal').style.display='block'; 
            document.getElementById('chatBtn').classList.remove('active-msg');
            loadChatHistory();
        }
        function closeChat() { document.getElementById('chat-modal').style.display='none'; }

        async function loadChatHistory() {
            const { data } = await supaClient.from('oracle_chat').select('*').order('created_at', { ascending: true }).limit(20);
            const container = document.getElementById('chat-history');
            container.innerHTML = data.map(m => `
                <div class="msg msg-user">${m.user_query} <span class="msg-status">${m.status==='done'?'<b style="color:#39ff14">✓✓</b>':'<b>✓</b>'}</span></div>
                ${m.vertex_response ? `<div class="msg msg-ai">${m.vertex_response}</div>` : ''}
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput'); if(!input.value) return;
            await supaClient.from('oracle_chat').insert([{ user_query: input.value, status: 'waiting' }]);
            input.value = ''; loadChatHistory();
        }

        // CONFIG AI LOGIKA
        async function openConfig() { document.getElementById('config-modal').style.display='block'; loadConfig(); }
        async function loadConfig() {
            const { data } = await supaClient.from('oracle_settings').select('*');
            document.getElementById('config-list').innerHTML = data.map(c => `<div style="padding:10px; border-bottom:1px solid #222; font-size:0.8rem;"><b>${c.id}:</b> ${c.value}</div>`).join('');
        }
        async function saveConfig() {
            const k = document.getElementById('confKey').value; const v = document.getElementById('confVal').value;
            if(!k || !v) return;
            await supaClient.from('oracle_settings').upsert({ id: k, value: v });
            loadConfig();
        }

        // REPORT / UČENÍ - S MAZÁNÍM JEDNOTLIVÝCH ŘÁDKŮ
        async function openLearning() { document.getElementById('learning-modal').style.display = 'block'; refreshCloud(); }
        function closeLearning() { document.getElementById('learning-modal').style.display = 'none'; }
        async function deleteSingleRow(id) {
            if(confirm("Smazat tento záznam?")) {
                await supaClient.from('oracle_trade_history').delete().eq('id', id);
                refreshCloud();
            }
        }
        async function refreshCloud() {
            const list = document.getElementById('cloud-history-list');
            const { data } = await supaClient.from('oracle_trade_history').select('*').order('created_at', { ascending: false });
            list.innerHTML = data.map(t => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #222; font-size:0.8rem;">
                    <span>${new Date(t.created_at).toLocaleTimeString().slice(0,5)} <b>${t.symbol}</b>: ${t.pnl.toFixed(2)} USDT</span>
                    <button onclick="deleteSingleRow('${t.id}')" style="background:none; border:none; color:var(--sell); cursor:pointer; font-weight:bold;">✕</button>
                </div>`).join('');
        }
        async function wipeAll() { if(confirm("SMAZAT VŠE?")) { await supaClient.from('oracle_trade_history').delete().neq('id', '0'); refreshCloud(); } }

        // ASSET MODAL
        function openAssetModal() { document.getElementById('asset-modal').style.display = 'block'; renderChecklist(); }
        function renderChecklist() { document.getElementById('asset-checklist').innerHTML = allPossibleAssets.map(a => `<div class="asset-item" onclick="toggleTempAsset('${a}')"><input type="checkbox" ${activeAssets.includes(a) ? 'checked' : ''}> <span style="color:#fff">${a}</span></div>`).join(''); }
        function toggleTempAsset(a) { if(activeAssets.includes(a)) { if(activeAssets.length > 1) activeAssets = activeAssets.filter(i => i !== a); } else activeAssets.push(a); renderChecklist(); }
        async function confirmAssetSelection() { await supaClient.from('oracle_settings').upsert({ id: 'active_assets', value: activeAssets }); document.getElementById('asset-modal').style.display = 'none'; renderNav(); updateDashboard(); }
    </script>
</body>
</html>
