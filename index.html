<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE TERMINAL | v260.9 REAL-PULSE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@12.1.0/dist/stellar-sdk.min.js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --panel: #0a0a0a; --buy: #39ff14; --sell: #ff4444; --hold: #ffd700; --warn: #ffae00; }
        body { background-color: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #pin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--neon); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; font-family: monospace; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 20px; font-size: 1.5rem; border-radius: 50%; cursor: pointer; transition: 0.2s; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 100000; }
        #pin-display { font-size: 3rem; letter-spacing: 10px; margin-bottom: 20px; color: #fff; }
        .header-box { width: 100%; max-width: 800px; padding: 5px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title-group { display: flex; align-items: center; gap: 8px; }
        h1 { color: #fff; font-size: 0.7rem; letter-spacing: 1px; margin: 0; text-transform: uppercase; font-weight: 900; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; vertical-align: middle; }
        .dot-active { background-color: var(--buy); box-shadow: 0 0 8px var(--buy); }
        .dot-off { background-color: var(--sell); box-shadow: 0 0 8px var(--sell); }
        .blink { animation: blink-anim 1.5s infinite; }
        @keyframes blink-anim { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .net-profit { color: var(--buy); font-weight: 900; font-size: 1.1rem; font-family: monospace; }
        .top-actions { display: flex; gap: 10px; align-items: center; }
        .action-square { background: #111; border: 1px solid #444; color: #fff; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 1rem; text-decoration: none; }
        .control-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; margin-bottom: 15px; gap: 5px; }
        .time-selector { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; }
        .time-btn { background: #111; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; font-weight: 900; min-width: 40px; }
        .time-btn.active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
        .bank-trigger { background: var(--neon); color: #000; border: none; padding: 8px 15px; border-radius: 6px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 800px; position: relative; }
        .card { background: var(--panel); border: 2px solid #333; border-radius: 16px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; min-height: 180px; justify-content: space-between; position: relative; }
        .top-sim-row { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; }
        .sim-btn-box { background: #111; border: 1px solid #444; color: #fff; padding: 6px 4px; border-radius: 6px; font-size: 0.55rem; font-weight: 900; text-align: center; cursor: pointer; min-width: 65px; line-height: 1.1; }
        .sim-btn-box.sim-active { border-color: var(--buy); color: var(--buy); }
        .coin-name { font-size: 0.9rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; }
        .coin-price { font-size: 1.45rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        .status-row { display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 4px; }
        .indicator { background: #111; padding: 8px 2px; border-radius: 6px; font-size: 0.55rem; font-weight: 900; flex: 1; text-align: center; line-height: 1.2; border: 1px solid #444; }
        .main-verdict { background: rgba(255,255,255,0.04); padding: 8px 2px; border-radius: 8px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; flex: 1.6; text-align: center; border: 1px solid #444; }
        #reportModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 20px; overflow-y: auto; }
        .bank-header { background: #111; border: 1px solid var(--neon); padding: 15px; border-radius: 12px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .bank-balance { font-size: 1.5rem; font-weight: 900; color: var(--neon); }
        .auto-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; }
        .auto-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.8rem; font-weight: 900; }
        .bank-input { background: #000; border: 1px solid #444; color: #fff; padding: 5px; width: 60px; text-align: center; font-weight: 900; border-radius: 4px; }
        .unit-btn { background: #222; border: 1px solid #444; color: var(--neon); padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; min-width: 45px; }
        .unit-btn.active-green { border-color: var(--buy); color: var(--buy); box-shadow: 0 0 5px var(--buy); }
        .history-item { display: flex; flex-direction: column; padding: 12px; border-bottom: 1px solid #222; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="pin-screen">
        <h2 style="letter-spacing: 5px;">ORACLE PŘIHLÁŠENÍ</h2>
        <div id="pin-display">____</div>
        <div class="pin-grid">
            <button class="pin-btn" onclick="press('1')">1</button><button class="pin-btn" onclick="press('2')">2</button><button class="pin-btn" onclick="press('3')">3</button>
            <button class="pin-btn" onclick="press('4')">4</button><button class="pin-btn" onclick="press('5')">5</button><button class="pin-btn" onclick="press('6')">6</button>
            <button class="pin-btn" onclick="press('7')">7</button><button class="pin-btn" onclick="press('8')">8</button><button class="pin-btn" onclick="press('9')">9</button>
            <button class="pin-btn" onclick="clearPin()" style="color:var(--sell)">C</button><button class="pin-btn" onclick="press('0')">0</button><button class="pin-btn" onclick="validatePin()" style="color:var(--buy)">OK</button>
        </div>
    </div>

    <div id="main-content" style="display: none; width: 100%; max-width: 800px;">
        <div class="header-box">
            <div class="title-group">
                <h1>ORACLE TERMINAL</h1>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <span id="motor-status" class="status-dot dot-off" title="Motor Status"></span>
                    <span id="data-status" class="status-dot dot-off" title="Data Status"></span>
                </div>
                <div id="profit-display" class="net-profit">0.00</div>
            </div>
            <div class="top-actions">
                <div class="action-square" onclick="toggleFullScreen()" title="Full Screen">⛶</div>
                <a href="admin.html" class="action-square" title="Admin">A</a>
            </div>
        </div>

        <div class="control-row">
            <div class="time-selector">
                <button class="time-btn active" onclick="setTime(this, '1M')">1M</button>
                <button class="time-btn" onclick="setTime(this, '5M')">5M</button>
                <button class="time-btn" onclick="setTime(this, '15M')">15M</button>
                <button class="time-btn" onclick="setTime(this, '1H')">1H</button>
                <button class="time-btn" onclick="setTime(this, '4H')">4H</button>
                <button class="time-btn" onclick="setTime(this, '24H')">24H</button>
            </div>
            <button class="bank-trigger" onclick="openReport()">BANK</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="reportModal">
        <div class="bank-header">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-size:0.6rem; color:#aaa;">UČENÍ VERTEX</span>
                <div style="display:flex; gap:10px;">
                    <button class="unit-btn" onclick="toggleLang()" style="font-size:0.5rem;"><span id="lang-cz">CZ</span>/<span id="lang-en">EN</span></button>
                    <button id="learn-btn" onclick="toggleLearning()" class="unit-btn">UČENÍ: VYP</button>
                </div>
            </div>
            <div id="bank-val" class="bank-balance">0.00 USDT</div>
            <div style="margin-top:10px; font-size:0.8rem;">OBCHOD: <input type="text" id="trade-stake" class="bank-input raw-input" value="250"> USDT</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px;">
                <button onclick="closeReport()" style="padding:14px; background:var(--neon); color:#000; border:none; font-weight:900; border-radius:6px; cursor:pointer; font-size:0.75rem;">ZAVŘÍT</button>
                <button onclick="simpleAction('clear')" style="padding:14px; background:#111; color:#fff; border:1px solid #444; font-weight:900; border-radius:6px; cursor:pointer; font-size:0.75rem;">SMAZAT</button>
                <button onclick="simpleAction('reset')" style="padding:14px; background:#111; color:#ff4444; border:1px solid #444; font-weight:900; border-radius:6px; cursor:pointer; font-size:0.75rem;">RESET</button>
            </div>
        </div>
        <div class="auto-box">
            <div class="auto-row"><span>MOTOR:</span><button id="auto-btn" class="unit-btn" onclick="toggleAutopilot()" style="width:80px;">VYP</button></div>
            <div class="auto-row"><span>ZAVŘÍT ZISKY:</span><div style="display:flex; align-items:center; gap:5px;"><button id="cat-btn" class="unit-btn" onclick="toggleCatcher()">VYP</button><input type="text" id="cat-sec" class="bank-input raw-input" id="cat-sec-input" value="10" style="width:40px;">s NAD <input type="text" id="cat-min" class="bank-input raw-input" id="cat-min-input" value="0.30" style="width:50px;">%</div></div>
            <div class="auto-row"><span>STOP LOSS:</span><div style="display:flex; align-items:center; gap:5px;"><button id="sl-unit" class="unit-btn" onclick="toggleUnit('sl')">%</button><input type="checkbox" id="sl-en" onchange="syncAuto()"><input type="text" id="sl-val" class="bank-input raw-input" value="8"></div></div>
            <div class="auto-row"><span>TAKE PROFIT:</span><div style="display:flex; align-items:center; gap:8px;"><button id="tp-unit" class="unit-btn" onclick="toggleUnit('tp')">%</button><input type="checkbox" id="tp-en" onchange="syncAuto()"><input type="text" id="tp-val" class="bank-input raw-input" value="10"></div></div>
        </div>
        <div id="historyList" style="max-height: 80vh; overflow-y: auto;"></div>
    </div>

    <script>
        const FEE_PERCENT = 0.15;
        const SB_URL = "https://zrbqhhnxshrayctqmncy.supabase.co";
        const SB_KEY = "sb_publishable_B6PKnoefXh3J_rbYCtAP8g__-eJp1lg";
        const supaClient = supabase.createClient(SB_URL, SB_KEY);

        let lang = localStorage.getItem('oracle_lang') || 'CZ', selectedTF = '1M';
        let activeTrades = {}, tradeHistory = JSON.parse(localStorage.getItem('oracle_history')) || [];
        let bank = 10000.00, totalProfit = 0.0, stake = parseFloat(localStorage.getItem('oracle_stake')) || 250.00;
        let autoSettings = { slEn: true, slVal: 8, tpEn: true, tpVal: 10, slUnit: '%', tpUnit: '%', learning: true, autopilot: false, catcher: false, catcherSec: 10, catcherMin: 0.30 };
        let activeAssets = ['BTC', 'ETH', 'SOL', 'BNB', 'XRP', 'ADA', 'DOGE', 'LTC', 'PI', 'M']; 
        let lastPrices = {};
        let pinInput = "";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function unlockAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
        const texts = { 
            CZ: { buy: 'KOUPIT', sell: 'PRODAT', hold: 'ČEKEJ', up: 'VZESTUP', down: 'POKLES', b: 'ZISK' }, 
            EN: { buy: 'BUY', sell: 'SELL', hold: 'HOLD', up: 'UP', down: 'DOWN', b: 'PROFIT' } 
        };

        function press(num) { unlockAudio(); pinInput += num; document.getElementById('pin-display').innerText = "*".repeat(pinInput.length); if(pinInput.length === 4) validatePin(); }
        function clearPin() { pinInput = ""; document.getElementById('pin-display').innerText = "____"; }
        function validatePin() { if(pinInput === "8550") { sessionStorage.setItem('oracle_auth', 'true'); document.getElementById('pin-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; initApp(); } else { alert("PŘÍSTUP ZAMÍTNUT"); clearPin(); } }

        async function syncFinancialsFromCloud() {
            try {
                const { data } = await supaClient.from('oracle_account').select('*').eq('id', 1).single();
                if (data) { bank = data.balance; totalProfit = data.total_profit; updateProfitDisplay(); }
            } catch(e) {}
        }

        async function updateCloudFinancials(newBank, newProfit) {
            bank = newBank; totalProfit = newProfit; updateProfitDisplay();
            try {
                await supaClient.from('oracle_account').upsert({ id: 1, balance: bank, total_profit: totalProfit, last_update: new Date().toISOString() });
                await supaClient.from('oracle_settings').upsert({ id: 'account_bank', value: bank.toFixed(2).toString() });
            } catch(e) {}
        }

        function setupRawInputs() {
            document.querySelectorAll('.raw-input').forEach(input => {
                input.addEventListener('input', () => {
                    let val = input.value.replace(',', '.').replace(/[^0-9.]/g, '');
                    if(input.id === 'trade-stake') updateStake(val); else syncAuto();
                });
            });
        }

        async function syncAuto() { 
            autoSettings.slEn = document.getElementById('sl-en').checked; 
            autoSettings.slVal = parseFloat(document.getElementById('sl-val').value) || 0;
            autoSettings.tpEn = document.getElementById('tp-en').checked; 
            autoSettings.tpVal = parseFloat(document.getElementById('tp-val').value) || 0;
            autoSettings.catcherSec = parseInt(document.getElementById('cat-sec').value) || 10;
            autoSettings.catcherMin = parseFloat(document.getElementById('cat-min').value) || 0.30;
            try { await supaClient.from('oracle_settings').upsert({ id: 'engine_params', value: autoSettings }); } catch(e) {}
            syncUI();
        }

        function updateProfitDisplay() {
            document.getElementById('profit-display').innerText = totalProfit.toFixed(2);
            document.getElementById('bank-val').innerText = bank.toFixed(2) + " USDT";
        }

        async function updateData() {
            try {
                const { data: dbSet } = await supaClient.from('oracle_settings').select('*');
                if (dbSet) {
                    const assets = dbSet.find(s => s.id === 'active_assets');
                    if (assets) activeAssets = assets.value;
                    const engine = dbSet.find(s => s.id === 'engine_params');
                    if (engine) { autoSettings = engine.value; syncUI(); }
                }

                const resBin = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","ADAUSDT","DOGEUSDT","LTCUSDT"]`).then(r=>r.json()).catch(()=>[]);
                const [resHype, resSignals, resBridge] = await Promise.all([
                    supaClient.from('oracle_hype').select('*'),
                    supaClient.from('oracle_signals').select('*').eq('timeframe', selectedTF==='24H'?'1D':selectedTF),
                    fetch("/api/oracle-bridge").then(r=>r.json()).catch(()=>[])
                ]);

                renderGrid(resBin, resHype.data || [], resSignals.data || [], resBridge);
                document.getElementById('data-status').className = "status-dot dot-active";
            } catch(e) { document.getElementById('data-status').className = "status-dot dot-off"; }
        }

        function renderGrid(binData, hData, sData, bData) {
            const t = texts[lang]; let html = "";
            activeAssets.forEach(sym => {
                const bin = binData.find(x => x.symbol === sym+"USDT");
                const sig = sData.find(x => x.symbol === sym) || {verdict:'HOLD'};
                const hype = hData.find(x => x.symbol === sym)?.score || 0;
                
                let p = 0, c = 0, v = "---";
                if (bin) {
                    p = parseFloat(bin.lastPrice); c = parseFloat(bin.priceChangePercent); v = (parseFloat(bin.quoteVolume) / 1e6).toFixed(1) + 'M';
                } else if (bData) {
                    const br = Array.isArray(bData) ? bData.find(x => x.id === sym || x.symbol === sym) : null;
                    if (br) { 
                        p = br.price || 0; c = br.change24h || 0; 
                        v = br.vol24h ? (br.vol24h / 1e6).toFixed(1) + 'M' : "---";
                    }
                }

                if (p === 0 && lastPrices[sym]) p = lastPrices[sym];
                lastPrices[sym] = p;

                let trade = activeTrades[sym];
                let pnlPct = trade ? (trade.type==='BUY'?(p-trade.entry)/trade.entry:(trade.entry-p)/trade.entry)*100 : 0;
                let pnlVal = ((pnlPct - FEE_PERCENT)/100)*stake;

                if(trade && autoSettings.slEn && pnlPct <= -autoSettings.slVal) executeClose(sym, p, trade);
                if(trade && autoSettings.tpEn && pnlPct >= autoSettings.tpVal) executeClose(sym, p, trade);

                let lB = `<div class="sim-btn-box" onclick="toggleSim('${sym}','BUY',${p},false,${hype},'${sig.verdict}')">${t.buy}</div>`;
                let rB = `<div class="sim-btn-box" onclick="toggleSim('${sym}','SELL',${p},false,${hype},'${sig.verdict}')">${t.sell}</div>`;
                
                if(trade?.type==='BUY') { 
                    let col = (pnlPct - FEE_PERCENT) >= 0 ? 'var(--buy)' : 'var(--sell)'; 
                    lB = `<div class="sim-btn-box sim-active" style="color:${col}; border-color:${col}" onclick="executeClose('${sym}',${p},activeTrades['${sym}'])">${t.b}<br>${pnlVal.toFixed(2)}$</div>`; 
                    rB = `<div class="sim-btn-box">${getTimer(trade.start)}</div>`; 
                }
                if(trade?.type==='SELL') { 
                    let col = (pnlPct - FEE_PERCENT) >= 0 ? 'var(--buy)' : 'var(--sell)'; 
                    rB = `<div class="sim-btn-box sim-active" style="color:${col}; border-color:${col}" onclick="executeClose('${sym}',${p},activeTrades['${sym}'])">${t.b}<br>${pnlVal.toFixed(2)}$</div>`; 
                    lB = `<div class="sim-btn-box">${getTimer(trade.start)}</div>`; 
                }

                html += `<div class="card"><div class="top-sim-row">${lB}${rB}</div><span class="coin-name">${sym}</span><span class="coin-price" style="color:${c>=0?'var(--buy)':'var(--sell)'}">$${p.toLocaleString(undefined,{minimumFractionDigits:sym==='BTC'?2:4})}</span><div class="status-row"><div class="indicator" style="color:${c>=0?'var(--buy)':'var(--sell)'}">${c>=0?t.up:t.down}<br>${c.toFixed(2)}%</div><div class="main-verdict" style="color:var(--${sig.verdict.toLowerCase().includes('buy')?'buy':(sig.verdict.toLowerCase().includes('sell')?'sell':'hold')})">${sig.verdict.includes('BUY')?t.buy:(sig.verdict.includes('SELL')?t.sell:t.hold)}<br><span style="font-size:0.55rem;color:#fff;">${hype}% HYPE</span></div><div class="indicator" style="color:#fff">VOL<br>${v}</div></div></div>`;
            });
            document.getElementById('grid').innerHTML = html;
        }

        async function toggleSim(sym, type, p, isAuto=false, hype=0, verdict='') { if(!activeTrades[sym] && bank >= stake) { const start = Date.now(); try { const { error } = await supaClient.from('oracle_active_trades').insert([{ symbol: sym, type: type, entry: p, start_time: start, is_auto: isAuto, hype: hype, verdict: verdict }]); if (!error) { await updateCloudFinancials(bank - stake, totalProfit); loadCloudTrades(); playBeep(); } } catch(e) {} } }
        async function executeClose(sym, price, trade) { if(trade.isClosing) return; trade.isClosing = true; const rawPct = (trade.type==='BUY'?(price-trade.entry)/trade.entry:(trade.entry-price)/trade.entry)*100; const netVal = ((rawPct - FEE_PERCENT)/100)*stake; try { await supaClient.from('oracle_active_trades').delete().eq('symbol', sym); await updateCloudFinancials(bank + stake + netVal, totalProfit + netVal); if(autoSettings.learning) await supaClient.from('oracle_trade_history').insert({ symbol:sym, type:trade.type, pnl:netVal, timeframe:selectedTF, is_auto:trade.isAuto }); loadCloudTrades(); playBeep(); } catch(e){} tradeHistory.unshift({ sym, pnl: netVal, time: new Date().toLocaleTimeString().slice(0,5), duration: getTimer(trade.start), hype: trade.hype, tf: selectedTF, isAuto: trade.isAuto }); localStorage.setItem('oracle_history', JSON.stringify(tradeHistory)); updateProfitDisplay(); }
        function profitCatcherLoop() { if(!autoSettings.catcher) return; for(const sym in activeTrades) { const t = activeTrades[sym]; const p = lastPrices[sym]; if(!p || t.isClosing) continue; const dur = Math.floor((Date.now()-t.start)/1000); const pnlPct = (t.type==='BUY'?(p-t.entry)/t.entry:(t.entry-p)/t.entry)*100; if(dur >= autoSettings.catcherSec && pnlPct >= autoSettings.catcherMin) executeClose(sym, p, t); } }
        function getTimer(s) { let d = Math.floor((Date.now()-s)/1000); return `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`; }
        function toggleAutopilot() { autoSettings.autopilot = !autoSettings.autopilot; syncAuto(); }
        function toggleLearning() { autoSettings.learning = !autoSettings.learning; syncAuto(); }
        function toggleCatcher() { autoSettings.catcher = !autoSettings.catcher; syncAuto(); }
        function toggleUnit(type) { if(type==='sl') autoSettings.slUnit = autoSettings.slUnit==='%'?'USDT':'%'; else autoSettings.tpUnit = autoSettings.tpUnit==='%'?'USDT':'%'; syncAuto(); }
        
        function syncUI() { 
            const mA = document.getElementById('motor-status'); mA.className = autoSettings.autopilot ? "status-dot dot-active blink" : "status-dot dot-off"; 
            const bA = document.getElementById('auto-btn'); bA.innerText = autoSettings.autopilot ? "ZAP" : "VYP"; bA.className = autoSettings.autopilot ? "unit-btn active-green" : "unit-btn";
            const bL = document.getElementById('learn-btn'); bL.innerText = autoSettings.learning ? "UČENÍ: ZAP" : "UČENÍ: VYP"; bL.className = autoSettings.learning ? "unit-btn active-green" : "unit-btn";
            const bC = document.getElementById('cat-btn'); bC.innerText = autoSettings.catcher ? "ZAP" : "VYP"; bC.className = autoSettings.catcher ? "unit-btn active-green" : "unit-btn";
            document.getElementById('sl-unit').innerText = autoSettings.slUnit || '%'; document.getElementById('tp-unit').innerText = autoSettings.tpUnit || '%';
            document.getElementById('sl-en').checked = autoSettings.slEn; document.getElementById('tp-en').checked = autoSettings.tpEn;
            document.getElementById('sl-val').value = autoSettings.slVal; document.getElementById('tp-val').value = autoSettings.tpVal;
            document.getElementById('cat-sec').value = autoSettings.catcherSec || 10; document.getElementById('cat-min').value = autoSettings.catcherMin || 0.30;
        }

        async function openReport() { let html = `<h3 style="color:#aaa; font-size:0.8rem; margin-top:20px;">POSLEDNÍ HISTORIE (LOKÁLNÍ)</h3>`; html += tradeHistory.slice(0,30).map(h => `<div class="history-item"><div style="display:flex; justify-content:space-between;"><span>${h.time} <b>${h.sym}</b></span><span style="color:${h.pnl>=0?'var(--buy)':'var(--sell)'}">${h.pnl.toFixed(2)} USDT</span></div></div>`).join(''); document.getElementById('historyList').innerHTML = html; document.getElementById('reportModal').style.display = 'block'; }
        function closeReport() { document.getElementById('reportModal').style.display = 'none'; }
        const audioCtx2 = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() { const osc = audioCtx2.createOscillator(); const gain = audioCtx2.createGain(); osc.connect(gain); gain.connect(audioCtx2.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx2.currentTime); gain.gain.setValueAtTime(0.1, audioCtx2.currentTime); osc.start(); osc.stop(audioCtx2.currentTime + 0.1); }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else if (document.exitFullscreen) document.exitFullscreen(); }
        function setTime(btn, label) { document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedTF = label; updateData(); }
        function toggleLang() { lang = (lang === 'CZ') ? 'EN' : 'CZ'; localStorage.setItem('oracle_lang', lang); updateData(); }
        function updateStake(v) { stake = parseFloat(v); localStorage.setItem('oracle_stake', stake); }
        async function simpleAction(t) { if(confirm("OK?")) { if(t==='reset') { try { await updateCloudFinancials(10000.00, 0.0); await supaClient.from('oracle_active_trades').delete().neq('symbol', 'VOID'); localStorage.clear(); location.reload(); } catch(e) {} } if(t==='clear') { tradeHistory=[]; localStorage.setItem('oracle_history','[]'); openReport(); } } }
        async function loadCloudTrades() { try { const { data } = await supaClient.from('oracle_active_trades').select('*'); let nt = {}; if(data) { data.forEach(t => { nt[t.symbol] = { type: t.type, entry: t.entry, start: parseInt(t.start_time), isAuto: t.is_auto, hype: t.hype, verdict: t.verdict, isClosing: false }; }); } activeTrades = nt; } catch(e) {} }
        async function initApp() { await syncFinancialsFromCloud(); await loadCloudTrades(); setInterval(updateData, 2000); setInterval(profitCatcherLoop, 1000); updateData(); setupRawInputs(); }
        window.onload = function() { if (sessionStorage.getItem('oracle_auth') === 'true') { document.getElementById('pin-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; initApp(); } };
    </script>
</body>
</html>
